{# Shared chat composer, include once per page #}
<div class="reply-preview-bar hidden" id="replyPreviewBar" role="region" aria-label="Replying to message">
  <div class="reply-preview-accent" aria-hidden="true"></div>
  <div class="reply-preview-body">
    <div class="reply-preview-label" id="replyPreviewLabel">Replying to</div>
    <div class="reply-preview-text" id="replyPreviewText"></div>
  </div>
  <button type="button" class="reply-preview-cancel" id="replyPreviewCancel" title="Cancel reply" aria-label="Cancel reply">✕</button>
</div>
<div class="input-bar" id="chatComposer">
  <input type="file" id="attachInput" class="hidden" multiple
         accept="image/jpeg,image/png,image/gif,image/webp,.pdf,.txt,.zip,.doc,.docx,.xls,.xlsx"/>
  <button type="button" class="attach-btn" id="attachBtn" title="Send photo or file" aria-label="Attach file">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
    </svg>
  </button>
  <div class="composer-field-wrap">
    <input type="text" id="msgInput" class="msg-field" placeholder="Type a message…" maxlength="1000" autocomplete="off"/>
    <div id="uploadProgress" class="upload-progress hidden" role="status"></div>
  </div>
  <button type="button" class="send-btn" id="sendBtn" title="Send" aria-label="Send message">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>
